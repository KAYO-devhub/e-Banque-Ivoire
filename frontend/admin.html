<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zéro Papier CI - Espace Administration</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>e-Banque Ivoire</h1>
      <p class="subtitle">🔒 Portail d'Authentification et de Contrôle Républicain</p>
    </header>

    <nav class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="dashboard.html">Mon Espace</a>
    </nav>

 <main>
  <h2>Contrôle de validité des pièces par QR Code</h2>
  <p style="font-size:14px; color:#555; margin-bottom: 15px;">
    Scannez le QR code du citoyen pour demander l'accès à ses documents.
  </p>

  <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin: 20px 0;">
    <div id="reader" style="width: 100%; max-width: 350px; border-radius: 8px; overflow: hidden;"></div>
    <button class="btn btn-success" id="startScanBtn">Ouvrir le Scanner</button>
  </div>

  <div id="status-message" style="margin-top: 15px; font-weight: bold; color: #FF6B00; text-align: center;"></div>

  <div id="client-info-section" style="display: none; margin-top: 25px; padding: 15px; background: #eef7f2; border-radius: 8px; border-left: 5px solid #009A44;">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
              <h3 style="margin-top: 0; color: #009A44; margin-bottom: 15px;">👤 Identité du Citoyen</h3>
              <p><strong>Nom :</strong> <span id="client-nom">...</span></p>
              <p><strong>Prénom :</strong> <span id="client-prenom">...</span></p>
              <p><strong>Email :</strong> <span id="client-email">...</span></p>

          </div>
          <button onclick="endConnection()" style="background: #FF3B30; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer;">🛑 Stopper</button>
      </div>
  </div>

  <!-- Liste documents reçus -->
  <div id="received-documents" style="display: none; margin-top: 20px;" class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="color: #009A44; margin: 0;">📋 Fichiers reçus :</h3>
        <button id="download-all-btn" class="btn btn-primary" style="padding: 8px 15px; width: auto; font-size: 13px; background: #FF6B00; color: white; border: none; border-radius: 6px; cursor: pointer;">
            ⬇️ Tout télécharger
        </button>
  </div>
    <ul id="docs-list" style="list-style: none; padding: 0;"></ul>
</div>
</main>

<script>
const API_URL = window.location.origin
const user = JSON.parse(localStorage.getItem('userData'));
const token = localStorage.getItem('token');

if (!token || !user || user.role.toLowerCase() !== 'admin') {
  alert("Accès réservé aux agents.");
  window.location.href = 'index.html';
}

let currentRequestId = null;
let connectedClientUuid = null; 
let pollingInterval = null; 

document.getElementById('startScanBtn').addEventListener('click', () => {
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    html5QrcodeScanner.render(async (decodedText) => {
        html5QrcodeScanner.clear();
        
        if (connectedClientUuid && connectedClientUuid !== decodedText) {
            return alert("Une session est déjà active. Terminez-la d'abord.");
        }

        connectedClientUuid = decodedText;
        document.getElementById('status-message').innerText = "⏳ En attente de validation citoyen...";
        
        await fetchClientInfo(decodedText);

        const res = await fetch(`${API_URL}/requests/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminUuid: user.uuid, clientUuid: decodedText })
        });
        
        const data = await res.json();
        if (data.success) {
            currentRequestId = data.requestId;
            waitForClientDocuments();
        }
    });
});

async function fetchClientInfo(uuid) {
    const res = await fetch(`${API_URL}/users/info/${uuid}`);
    const data = await res.json();
    if (data.success) {
        document.getElementById('client-nom').innerText = data.user.nom;
        document.getElementById('client-prenom').innerText = data.user.prenom;
        document.getElementById('client-email').innerText = data.user.email;
        document.getElementById('client-info-section').style.display = 'block';
    }
}

function waitForClientDocuments() {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
        try {
            const res = await fetch(`${API_URL}/requests/check-admin/${currentRequestId}`);
            const data = await res.json();
            
            if (data.status === 'accepted') {
                clearInterval(pollingInterval);
                displayReceivedDocuments(data.documents);
            }
        } catch (e) { console.error(e); }
    }, 3000);
}

function displayReceivedDocuments(docs) {
    document.getElementById('status-message').innerText = "✅ Documents reçus.";
    const container = document.getElementById('received-documents');
    const list = document.getElementById('docs-list');
    
    // Afficher le conteneur
    container.style.display = 'block';
    list.innerHTML = ''; // Nettoyer la liste précédente au cas où
    
    docs.forEach(doc => {
        const fileName = doc.chemin_fichier.split(/[/\\]/).pop();
        const fileUrl = `${API_URL}/uploads/${fileName}`;
        const li = document.createElement('li');
        li.style.cssText = "padding: 12px 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;";
        
        // Ajout des boutons Voir et Télécharger pour chaque document
        li.innerHTML = `
            <span style="font-weight: 500;">📄 ${doc.nom_document}</span>
            <div style="display: flex; gap: 8px;">
                <a href="${fileUrl}" target="_blank" style="padding: 6px 12px; background: transparent; color: #333; border: 1px solid #ccc; border-radius: 4px; text-decoration: none; font-size: 13px; font-weight: bold;">
                    👁️ Voir
                </a>
                <a href="${fileUrl}" download class="btn btn-success" target="_blank" style="padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 13px;">
                    ⬇️ Télécharger
                </a>
            </div>
        `;
        list.appendChild(li);
    });

    // Éviter de multiplier les événements "click" si la fonction est appelée plusieurs fois
    const downloadAllBtn = document.getElementById('download-all-btn');
    const newDownloadAllBtn = downloadAllBtn.cloneNode(true);
    downloadAllBtn.replaceWith(newDownloadAllBtn);

    // Lier l'événement au bouton "Tout télécharger"
    newDownloadAllBtn.addEventListener('click', () => {
        downloadAllDocuments(docs);
    });
}

// Nouvelle fonction pour déclencher les téléchargements multiples
async function downloadAllDocuments(docs) {
    if (!docs || docs.length === 0) return;

    for (const doc of docs) {
        const fileName = doc.chemin_fichier.split(/[/\\]/).pop();
        const fileUrl = `${API_URL}/uploads/${fileName}`;

        try {
            // 1. Récupérer le fichier via fetch (en binaire)
            const response = await fetch(fileUrl);
            if (!response.ok) throw new Error(`Erreur lors du téléchargement de ${fileName}`);

            const blob = await response.blob();
            
            // 2. Créer une URL temporaire pour le blob
            const url = window.URL.createObjectURL(blob);
            
            // 3. Créer un lien virtuel et déclencher le clic
            const link = document.createElement('a');
            link.href = url;
            link.download = doc.nom_document || fileName;
            document.body.appendChild(link);
            link.click();
            
            // 4. Nettoyage : retirer le lien et libérer l'URL mémoire
            document.body.removeChild(link);
            window.URL.revokeObjectURL(url);

            // Petit délai optionnel pour ne pas saturer le navigateur
            await new Promise(resolve => setTimeout(resolve, 500));
            
        } catch (error) {
            console.error("Échec du téléchargement pour :", fileName, error);
            alert(`Erreur lors du téléchargement de ${fileName}. Vérifiez votre connexion.`);
        }
    }
}

function endConnection() {
    if (pollingInterval) clearInterval(pollingInterval);
    connectedClientUuid = null;
    document.getElementById('client-info-section').style.display = 'none';
    document.getElementById('received-documents').style.display = 'none';
    document.getElementById('docs-list').innerHTML = '';
    document.getElementById('status-message').innerText = "";
}
</script>
</body>
</html>
